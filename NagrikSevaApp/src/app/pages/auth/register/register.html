<div class="page">
  <div class="left-panel">
    <div class="left-content">
      <div class="gov-logo">
        <img src="assets/images/nagrik-logo.png"
             onerror="this.style.display='none'"
             alt="Logo" width="65" height="65"/> </div>
      <h1>Nagrik Seva Portal</h1>
      <p>Government of India</p>
      <div class="divider-line"></div>
      <div class="features">
        <div class="feat">
          <svg xmlns="http://www.w3.org/2000/svg"
     width="16" height="16" viewBox="0 0 24 24"
     fill="none" stroke="#22c55e"
     stroke-width="2.5" stroke-linecap="round"
     stroke-linejoin="round"
     style="flex-shrink:0">
  <polyline points="20,6 9,17 4,12"/>
</svg> Free Registration</div>
        <div class="feat">
          <svg xmlns="http://www.w3.org/2000/svg"
     width="16" height="16" viewBox="0 0 24 24"
     fill="none" stroke="#22c55e"
     stroke-width="2.5" stroke-linecap="round"
     stroke-linejoin="round"
     style="flex-shrink:0">
  <polyline points="20,6 9,17 4,12"/>
</svg> Secure & Private</div>
        <div class="feat"><svg xmlns="http://www.w3.org/2000/svg"
     width="16" height="16" viewBox="0 0 24 24"
     fill="none" stroke="#22c55e"
     stroke-width="2.5" stroke-linecap="round"
     stroke-linejoin="round"
     style="flex-shrink:0">
  <polyline points="20,6 9,17 4,12"/>
</svg> 20+ Services</div>
        <div class="feat"><svg xmlns="http://www.w3.org/2000/svg"
     width="16" height="16" viewBox="0 0 24 24"
     fill="none" stroke="#22c55e"
     stroke-width="2.5" stroke-linecap="round"
     stroke-linejoin="round"
     style="flex-shrink:0">
  <polyline points="20,6 9,17 4,12"/>
</svg> Real-time Tracking</div>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="form-box">

      <div class="form-header">
        <h2>Create Account</h2>
        <p>Register to access government services</p>
      </div>
      <!-- Add this as first element inside the form card -->
<div style="margin-bottom: 16px;">
  <a routerLink="/"
     title="Back to Home"
     style="display:inline-flex;
            align-items:center;
            gap:6px;
            color:#1a3a6b;
            text-decoration:none;
            font-size:13px;
            font-weight:600;
            padding:6px 12px;
            border-radius:8px;
            border:1px solid #e2e8f0;
            transition:all 0.2s"
     onmouseenter="this.style.background='#f1f5f9'"
     onmouseleave="this.style.background='transparent'">
    <svg xmlns="http://www.w3.org/2000/svg"
         width="16" height="16" viewBox="0 0 24 24"
         fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round"
         stroke-linejoin="round">
      <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9,22 9,12 15,12 15,22"/>
    </svg>
  
  </a>
</div>

      <!-- Name -->
      <div class="input-group">
        <label>Full Name</label>
        <div class="input-wrap">
          <svg class="inp-icon" viewBox="0 0 24 24"
               width="18" height="18" fill="none"
               stroke="#1a3a6b" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input type="text" placeholder="Your full name"
                 [(ngModel)]="name" />
        </div>
      </div>

      <!-- Email -->
      <div class="input-group">
        <label>Email Address</label>
        <div class="input-wrap" [class.invalid]="emailError">
          <svg class="inp-icon" viewBox="0 0 24 24"
               width="18" height="18" fill="none"
               stroke="#1a3a6b" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" placeholder="your@email.com"
                 [(ngModel)]="email"
                 (input)="validateEmail()" />
        </div>
        <p class="field-error" *ngIf="emailError">
          {{ emailError }}
        </p>
      </div>

      <!-- Phone -->
      <div class="input-group">
        <label>Phone Number</label>
        <div class="input-wrap">
          <svg class="inp-icon" viewBox="0 0 24 24"
               width="18" height="18" fill="none"
               stroke="#1a3a6b" stroke-width="2">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6.09 6.09l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
          <input type="tel" placeholder="10 digit mobile number"
                 [(ngModel)]="phone" />
        </div>
      </div>

      <!-- Role -->
      <div class="input-group">
        <label>Register As</label>
        <select [(ngModel)]="role" class="role-select">
          <option value="Citizen">Citizen</option>
          <option value="Officer">Government Officer</option>
        </select>
      </div>

      <!-- Password -->
      <div class="input-group">
        <label>Password</label>
        <div class="input-wrap" [class.invalid]="passwordError">
          <svg class="inp-icon" viewBox="0 0 24 24"
               width="18" height="18" fill="none"
               stroke="#1a3a6b" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input [type]="showPassword ? 'text' : 'password'"
                 placeholder="Create strong password"
                 [(ngModel)]="password"
                 (input)="validatePassword()" />
          <button class="toggle-btn" type="button"
                  (click)="showPassword = !showPassword">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
        <p class="field-error" *ngIf="passwordError">
          {{ passwordError }}
        </p>
        <div class="strength-wrap" *ngIf="password">
          <div class="strength-bars">
            <div class="sbar"
                 *ngFor="let i of [1,2,3,4,5]"
                 [style.background]="getStrength() >= i
                   ? getStrengthColor()
                   : '#e2e8f0'">
            </div>
          </div>
          <span [style.color]="getStrengthColor()"
                class="strength-text">
            {{ getStrengthLabel() }}
          </span>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="input-group">
        <label>Confirm Password</label>
        <div class="input-wrap">
          <svg class="inp-icon" viewBox="0 0 24 24"
               width="18" height="18" fill="none"
               stroke="#1a3a6b" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password"
                 placeholder="Repeat your password"
                 [(ngModel)]="confirmPassword" />
        </div>
      </div>

      <div class="message-box" *ngIf="message"
           [class.error]="isError"
           [class.success]="!isError">
        {{ message }}
      </div>

      <button class="btn-submit" (click)="register()"
              [disabled]="isLoading">
        {{ isLoading ? 'Creating Account...' : 'Create Account' }}
      </button>

      <p class="login-link">
        Already registered?
        <a routerLink="/login">Sign in here</a>
      </p>

      <a routerLink="/" class="back-link">← Back to Home</a>
    </div>
  </div>
</div>
