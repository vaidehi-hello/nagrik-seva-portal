<div class="register-page">

  <!-- ── LEFT — CAROUSEL ── -->
  <div class="register-left">
    <div *ngFor="let slide of slides; let i = index"
         class="carousel-slide"
         [class.active]="i === currentSlide"
         [style.backgroundImage]="'url(' + slide + ')'">
    </div>
    <div class="register-left-overlay"></div>

    <div class="register-left-content">
      <img src="assets/images/nagrik-logo.png" alt="Logo" width="90" height="90" />
      <h1>Nagrik Seva Portal</h1>
      <p>Government of India</p>
      <div class="orange-divider"></div>

      <div class="feature-pills">
        <div class="feature-pill">
          <lucide-icon [img]="icons.CheckCircle" [size]="16"></lucide-icon>
          Free Registration
        </div>
        <div class="feature-pill">
          <lucide-icon [img]="icons.CheckCircle" [size]="16"></lucide-icon>
          Secure &amp; Private
        </div>
        <div class="feature-pill">
          <lucide-icon [img]="icons.CheckCircle" [size]="16"></lucide-icon>
          20+ Services
        </div>
        <div class="feature-pill">
          <lucide-icon [img]="icons.CheckCircle" [size]="16"></lucide-icon>
          Real-time Tracking
        </div>
      </div>
    </div>

    <!-- Carousel dots -->
    <div class="carousel-dots">
      <span *ngFor="let slide of slides; let i = index"
            class="dot"
            [class.active]="i === currentSlide">
      </span>
    </div>
  </div>

  <!-- ── RIGHT — FORM ── -->
  <div class="register-right">

    <!-- Home icon top-right -->
    <button class="home-icon-btn" (click)="goHome()" title="Back to Home">
      <lucide-icon [img]="icons.Home" [size]="18"></lucide-icon>
    </button>

    <div class="register-form-wrap">
      <h2>Create Account</h2>
      <p class="form-subtitle">Register to access government services</p>

      <div class="fg">
        <label>Full Name</label>
        <input type="text"
               [(ngModel)]="fullName"
               placeholder="Your full name" />
      </div>

      <div class="fg">
        <label>Email Address</label>
        <input type="email"
               [(ngModel)]="email"
               placeholder="your@email.com" />
      </div>

      <div class="fg">
        <label>Phone Number</label>
        <input type="tel"
               [(ngModel)]="phone"
               placeholder="10 digit mobile number"
               maxlength="10" />
      </div>

      <div class="fg">
        <label>Register As</label>
        <select [(ngModel)]="role">
          <option value="Citizen">Citizen</option>
          <option value="Officer">Officer</option>
        </select>
      </div>

      <div class="fg">
        <label>Password</label>
        <div class="password-wrap">
          <input [type]="showPassword ? 'text' : 'password'"
                 [(ngModel)]="password"
                 placeholder="Create strong password" />
          <button type="button" class="eye-btn" (click)="togglePassword()">
            <lucide-icon [img]="showPassword ? icons.EyeOff : icons.Eye" [size]="16"></lucide-icon>
          </button>
        </div>
      </div>

      <div class="fg">
        <label>Confirm Password</label>
        <div class="password-wrap">
          <input [type]="showConfirmPassword ? 'text' : 'password'"
                 [(ngModel)]="confirmPassword"
                 placeholder="Repeat your password" />
          <button type="button" class="eye-btn" (click)="toggleConfirmPassword()">
            <lucide-icon [img]="showConfirmPassword ? icons.EyeOff : icons.Eye" [size]="16"></lucide-icon>
          </button>
        </div>
      </div>

      <div class="msg-err" *ngIf="message && isError">{{ message }}</div>
      <div class="msg-ok" *ngIf="message && !isError">{{ message }}</div>

      <button type="button" class="btn-create" (click)="onSubmit()">
        {{ isSubmitting ? 'Creating Account...' : 'Create Account' }}
      </button>

      <p class="switch-link">
        Already registered?
        <a routerLink="/login">Sign in here</a>
      </p>
    </div>
  </div>
</div>
