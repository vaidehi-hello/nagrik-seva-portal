<div class="page">
  <div class="left-panel">
    <div class="left-content">
      <div class="gov-logo">
        <img src="assets/images/nagrik-logo.png"
             onerror="this.style.display='none'"
             alt="Logo" width="65" height="65"/> </div>
      <h1>Nagrik Seva Portal</h1>
      <p>Government of India</p>
      <div class="divider-line"></div>
      <div class="features">
        <div class="feat">✅ Secure Login</div>
        <div class="feat">✅ Role Based Access</div>
        <div class="feat">✅ Digital Services</div>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="form-box">
      <div class="form-header">
        <h2>Sign In</h2>
        <p>Access your Nagrik Seva account</p>
      </div>

      <div class="input-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <svg class="inp-icon" viewBox="0 0 24 24" width="18" height="18"
               fill="none" stroke="#1a3a6b" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" placeholder="your@email.com"
                 [(ngModel)]="email" />
        </div>
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="input-wrap">
          <svg class="inp-icon" viewBox="0 0 24 24" width="18" height="18"
               fill="none" stroke="#1a3a6b" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input [type]="showPassword ? 'text' : 'password'"
                 placeholder="Enter password"
                 [(ngModel)]="password" />
          <button class="toggle-btn" type="button"
                  (click)="showPassword = !showPassword">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <div class="message-box" *ngIf="message"
           [class.error]="isError" [class.success]="!isError">
        {{ message }}
      </div>

      <button class="btn-submit" (click)="login()"
              [disabled]="isLoading">
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>

      <p class="register-link">
        New citizen?
        <a routerLink="/register">Register here</a>
      </p>

      <a routerLink="/" class="back-link">← Back to Home</a>
    </div>
  </div>
</div>
