<div class="login-page">

  <!-- ── LEFT — CAROUSEL ── -->
  <div class="login-left">
    <div *ngFor="let slide of slides; let i = index"
         class="carousel-slide"
         [class.active]="i === currentSlide"
         [style.backgroundImage]="'url(' + slide + ')'">
    </div>
    <div class="login-left-overlay"></div>

    <div class="login-left-content">
      <img src="assets/images/nagrik-logo.png" alt="Logo" width="90" height="90" />
      <h1>Nagrik Seva Portal</h1>
      <p>Government of India</p>
      <div class="orange-divider"></div>

      <div class="feature-pills">
        <div class="feature-pill">
          <lucide-icon [img]="icons.ShieldCheck" [size]="16"></lucide-icon>
          Secure Login
        </div>
        <div class="feature-pill">
          <lucide-icon [img]="icons.ShieldCheck" [size]="16"></lucide-icon>
          Role Based Access
        </div>
        <div class="feature-pill">
          <lucide-icon [img]="icons.ShieldCheck" [size]="16"></lucide-icon>
          Digital Services
        </div>
      </div>
    </div>

    <!-- Carousel dots -->
    <div class="carousel-dots">
      <span *ngFor="let slide of slides; let i = index"
            class="dot"
            [class.active]="i === currentSlide">
      </span>
    </div>
  </div>

  <!-- ── RIGHT — FORM ── -->
  <div class="login-right">

    <!-- Home icon top-right -->
    <button class="home-icon-btn" (click)="goHome()" title="Back to Home">
      <lucide-icon [img]="icons.Home" [size]="18"></lucide-icon>
    </button>

    <div class="login-form-wrap">
      <h2>Sign In</h2>
      <p class="form-subtitle">Access your Nagrik Seva account</p>

      <div class="fg">
        <label>Email Address</label>
        <input type="email"
               [(ngModel)]="email"
               placeholder="your@email.com" />
      </div>

      <div class="fg">
        <label>Password</label>
        <div class="password-wrap">
          <input [type]="showPassword ? 'text' : 'password'"
                 [(ngModel)]="password"
                 placeholder="Enter password" />
          <button type="button" class="eye-btn" (click)="togglePassword()">
            <lucide-icon [img]="showPassword ? icons.EyeOff : icons.Eye" [size]="16"></lucide-icon>
          </button>
        </div>
      </div>

      <div class="msg-err" *ngIf="message && isError">{{ message }}</div>
      <div class="msg-ok" *ngIf="message && !isError">{{ message }}</div>

      <button type="button" class="btn-signin" (click)="onSubmit()">
        {{ isSubmitting ? 'Signing in...' : 'Sign In' }}
      </button>

      <p class="switch-link">
        New citizen?
        <a routerLink="/register">Register here</a>
      </p>
    </div>
  </div>
</div>
